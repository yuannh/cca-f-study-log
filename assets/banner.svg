    <text x="38" y="105" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14.5" fill="#555">Parse the text for "done"</text>

    <rect x="22" y="124" width="380" height="36" rx="8" fill="#e8f5e9" stroke="#2e7d32"/>
    <text x="38" y="147" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#1a1a1a"><tspan fill="#2e7d32" font-weight="700">✓ </tspan>stop_reason == "end_turn"</text>

