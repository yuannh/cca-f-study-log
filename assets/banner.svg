<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CCA-F Study Log">
  <rect width="1280" height="400" fill="#f4f1ea"/>
  <rect x="0" y="0" width="10" height="400" fill="#b5502f"/>

  <!-- top labels -->
  <text x="64" y="66" font-family="ui-monospace, Menlo, monospace" font-size="20" font-weight="700" fill="#b5502f">CCA-F</text>
  <text x="142" y="66" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#6b6b6b">Study Log</text>
  <text x="1216" y="66" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="18" fill="#6b6b6b">dearartist.xyz</text>

  <!-- title -->
  <text x="64" y="158" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="#1a1a1a">Studying for the Claude</text>
  <text x="64" y="212" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="#1a1a1a">Certified Architect exam —</text>
  <text x="64" y="266" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="#b5502f">in public.</text>

  <!-- subtitle -->
  <text x="64" y="315" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" fill="#4a4a4a">4 weeks · 5 domains · everything open-source</text>

  <!-- contents line -->
  <text x="64" y="356" font-family="ui-monospace, Menlo, monospace" font-size="16" fill="#7a7a7a">bilingual guides · 8 hands-on projects · browser mock tests · weekly blog</text>

  <!-- mini question card -->
  <g transform="translate(792,96)">
    <rect x="0" y="0" width="424" height="208" rx="14" fill="#fbfaf6" stroke="#e0dccf" stroke-width="1"/>
    <text x="22" y="34" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#b5502f" letter-spacing="1">DOMAIN 1 · Q1</text>
    <text x="22" y="64" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#1a1a1a">How does the loop know it's done?</text>

